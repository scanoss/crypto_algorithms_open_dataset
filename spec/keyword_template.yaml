# Cryptographic algorithm keyword definition.
# This file defines the keyword set used to detect a cryptographic algorithm
# inside source files. Algorithm metadata (name, OID, class, key sizes,
# references) lives in the SPDX cryptographic-algorithm-list repository,
# linked here via the algorithmId. See spec/README.md.

algorithmId:        # SPDX id of the algorithm. Filename MUST be <algorithmId>.yaml.
keywords:           # list of unique strings (with or without spaces).
  -
